name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guard:
    name: secrets & structure guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No secret-like strings in tracked files
        run: |
          set -e
          # API keys, private keys, cloud creds — fail the build if any appear in tracked content.
          if git grep -nEI 'nvapi-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----|ghp_[A-Za-z0-9]{30,}' -- . ':!**/*.example' ':!.github/workflows/*'; then
            echo "::error::Secret-like content found in tracked files. Remove it and rotate the credential."
            exit 1
          fi
          echo "No secret-like strings found."

      - name: No committed env/secret files
        run: |
          set -e
          # tracked .env / .env.* or anything under secrets/, minus the allowed *.example and secrets/README.md
          bad=$(git ls-files | grep -E '(^|/)\.env($|\.)|^secrets/' | grep -vE '\.example$|^secrets/README\.md$' || true)
          if [ -n "$bad" ]; then
            echo "::error::A real .env or secrets file is tracked (must be gitignored):"
            echo "$bad"
            exit 1
          fi
          echo "No tracked env/secret files."

      - name: Pointer files delegate to AGENTS.md
        run: |
          set -e
          for f in CLAUDE.md GEMINI.md .cursorrules .windsurfrules .github/copilot-instructions.md; do
            if [ -f "$f" ] && ! grep -q 'AGENTS.md' "$f"; then
              echo "::error::$f does not reference AGENTS.md"; exit 1
            fi
          done
          test -f AGENTS.md || { echo "::error::AGENTS.md missing"; exit 1; }
          echo "Pointer files OK."

      - name: Every skill has frontmatter
        run: |
          set -e
          fail=0
          for s in skills/*/SKILL.md; do
            head -1 "$s" | grep -q '^---$' || { echo "::error::$s missing YAML frontmatter"; fail=1; }
          done
          exit $fail

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan working tree with gitleaks
        run: |
          set -e
          VER=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          # scan current files (no-git): immune to history rewrites / root-commit ranges, and
          # still catches any secret present in the tree. Non-zero exit if anything is found.
          ./gitleaks dir . --redact -v --exit-code 1
